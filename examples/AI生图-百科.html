<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 生图 · 行业百科</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font-display:'Space Grotesk','Noto Sans SC',-apple-system,sans-serif;
  --font-body:'Inter','Noto Sans SC','PingFang SC',-apple-system,sans-serif;
  --ease-out:cubic-bezier(0.16,1,0.3,1);
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--font-body);color:#1a1a1a;background:#F9EFE0;line-height:1.6;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;min-height:100vh;position:relative}
/* ===== 3D 粘土边框背景（同主站） ===== */
body::before{content:'';position:fixed;inset:-4%;z-index:-2;
  background:url(bg-clay.png) center/cover no-repeat;
  transform:scale(1.02);animation:bg-breath 14.67s ease-in-out infinite;will-change:transform;
  filter:saturate(1.02)}
body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(ellipse 75% 70% at 50% 50%, rgba(249,239,224,0.85) 0%, rgba(249,239,224,0.55) 40%, rgba(249,239,224,0) 80%);
  }
@keyframes bg-breath{
  0%,100%{transform:scale(1.02) translate(0,0)}
  33%{transform:scale(1.04) translate(-8px,-6px)}
  66%{transform:scale(1.03) translate(6px,-8px)}
}
::selection{background:#166534;color:#fff}

/* ===== 顶部 ===== */
.page-head{max-width:1200px;margin:0 auto;padding:60px 32px 32px;text-align:center}
.page-head h1{font-family:var(--font-display);font-size:2.8rem;font-weight:700;letter-spacing:-.035em;color:#111;margin-bottom:12px}
.page-head .subtitle{font-size:1rem;color:#666;font-weight:400;max-width:640px;margin:0 auto 8px;line-height:1.6}
.page-head .meta{display:inline-flex;gap:16px;margin-top:20px;padding:8px 18px;border-radius:24px;background:rgba(255,255,255,0.78);backdrop-filter:blur(14px) saturate(130%);-webkit-backdrop-filter:blur(14px) saturate(130%);font-size:.72rem;color:#444;font-weight:500;letter-spacing:.04em;box-shadow:0 2px 12px rgba(0,0,0,0.05),inset 0 0 0 1px rgba(255,255,255,0.5)}
.page-head .meta strong{color:#166534;font-weight:600}

/* ===== 三强区 ===== */
.top3-section{max-width:1200px;margin:0 auto 48px;padding:36px;border-radius:32px;background:rgba(255,255,255,0.78);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);position:relative;box-shadow:0 4px 24px rgba(0,0,0,0.05),inset 0 0 0 1px rgba(255,255,255,0.5)}
.top3-head{margin-bottom:28px}
.top3-title{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.top3-title h2{font-family:var(--font-display);font-size:1.32rem;font-weight:700;color:#111}
.top3-title h2 em{font-style:normal;color:#0F6E56;font-weight:500;font-size:.82rem;margin-left:8px}
.top3-sub{font-size:.78rem;color:#888;letter-spacing:.01em}
.top3-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.cmp-card{background:rgba(255,255,255,0.92);backdrop-filter:blur(10px) saturate(130%);-webkit-backdrop-filter:blur(10px) saturate(130%);border-radius:20px;overflow:visible;box-shadow:0 2px 14px rgba(0,0,0,0.05);position:relative;transition:all .3s var(--ease-out);border:0.5px solid rgba(255,255,255,0.5)}
.cmp-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.1)}
.cmp-body{padding:20px 20px 4px}
.cmp-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cmp-logo{width:44px;height:44px;border-radius:12px;background:#F4F4F1;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:600;color:#888;flex-shrink:0;overflow:hidden}
.cmp-logo img{width:100%;height:100%;object-fit:contain}
.cmp-name-wrap{flex:1;min-width:0}
.cmp-name{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:#111;letter-spacing:-.01em;line-height:1.2}
.cmp-en{font-size:.68rem;color:#888;letter-spacing:.04em;margin-top:2px}
.cmp-niche{font-size:.8rem;color:#444;line-height:1.5;margin-top:8px;word-break:break-word}
.cmp-tags{display:flex;gap:6px;flex-wrap:wrap;margin:4px 20px 14px}
.cmp-tag{font-size:.65rem;padding:3px 10px;background:#F4F4F1;color:#555;border-radius:10px;font-weight:500}
.cmp-section-label{font-family:var(--font-display);font-size:.66rem;font-weight:600;color:#0F6E56;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.cmp-moat{padding:0 20px;margin-bottom:14px}
.cmp-moat-pro{font-size:.78rem;color:#333;line-height:1.75;background:#F0F8F2;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.cmp-moat-pro::before{content:'专业视角';display:block;font-size:.62rem;color:#0F6E56;letter-spacing:.08em;margin-bottom:4px;font-weight:600}
.cmp-moat-ez{font-size:.78rem;color:#333;line-height:1.75;background:#F4F4F1;border-radius:10px;padding:10px 12px}
.cmp-moat-ez::before{content:'大白话';display:block;font-size:.62rem;color:#888;letter-spacing:.08em;margin-bottom:4px;font-weight:600}

.cmp-life{padding:0 20px;margin-bottom:14px}
.cmp-life-stages{display:flex;gap:4px}
.cmp-life-stage{flex:1;text-align:center;position:relative}
.cmp-life-stage .dot{width:10px;height:10px;border-radius:50%;background:#ddd;margin:0 auto 4px;transition:background .3s}
.cmp-life-stage.done .dot{background:#B8E4C8}
.cmp-life-stage.active .dot{background:#0F6E56;box-shadow:0 0 0 4px rgba(15,110,86,0.15)}
.cmp-life-stage .label{font-size:.65rem;color:#999}
.cmp-life-stage.active .label{color:#0F6E56;font-weight:600}

.cmp-rev{padding:0 20px 4px}
.cmp-rev-item{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cmp-rev-label{font-size:.72rem;color:#444;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.cmp-rev-bar-wrap{flex:1.2;height:8px;background:#F0F0EC;border-radius:6px;overflow:hidden}
.cmp-rev-bar{height:100%;border-radius:6px;width:var(--w,0%);transition:width 1s var(--ease-out)}
.cmp-rev-pct{font-family:var(--font-display);font-size:.72rem;font-weight:700;color:#111;width:40px;text-align:right}
.cmp-rev-empty{font-size:.72rem;color:#999;font-style:italic;padding:8px 12px;background:rgba(0,0,0,0.03);border-radius:8px;text-align:center}

.cmp-visit{display:inline-flex;align-items:center;gap:6px;margin:4px 20px 20px;padding:8px 14px;border-radius:12px;background:#F4F4F1;color:#444;font-size:.78rem;font-weight:500;text-decoration:none;transition:all .2s}
.cmp-visit:hover{background:#E8F1EB;color:#0F6E56;transform:translateY(-1px)}

/* ===== 关键词 Section ===== */
.kw-section-title{max-width:1200px;margin:48px auto 16px;padding:0 32px;display:flex;align-items:baseline;justify-content:space-between}
.kw-section-title h2{font-family:var(--font-display);font-size:1.22rem;font-weight:700;color:#111}
.kw-section-title h2 em{font-style:normal;color:#0F6E56;font-size:.78rem;font-weight:500;margin-left:6px}
.kw-section-title .kst-meta{font-size:.72rem;color:#666;letter-spacing:.02em}

.kw-grid{max-width:1200px;margin:0 auto;padding:0 32px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}

/* ===== 关键词卡片 ===== */
.kw-card{position:relative;background:rgba(255,255,255,0.88);backdrop-filter:blur(12px) saturate(130%);-webkit-backdrop-filter:blur(12px) saturate(130%);border-radius:16px;overflow:visible;transition:all .3s var(--ease-out);box-shadow:0 2px 12px rgba(0,0,0,0.04);border:0.5px solid rgba(255,255,255,0.5)}
.kw-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.08)}
.kw-top{padding:18px 20px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.kw-num{font-family:var(--font-display);font-size:.62rem;font-weight:500;letter-spacing:.04em;color:#999;flex-shrink:0;white-space:nowrap}
.kw-name{font-family:var(--font-display);font-size:1.06rem;font-weight:600;flex:1;letter-spacing:-.01em;line-height:1.35;color:#111}
.kw-name mark{background:rgba(34,197,94,0.18);color:#166534;font-weight:600;padding:0 2px;border-radius:2px}
.kw-body{padding:0 20px 16px}

/* ===== 区块通用 ===== */
.kw-section{position:relative;padding:12px 0;border-top:0.5px solid rgba(0,0,0,0.08)}
.kw-section:first-child{border-top:none;padding-top:4px}

/* ===== 区块标签 ===== */
.kw-label{display:inline-block;padding:0;font-family:var(--font-display);font-size:.66rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;white-space:nowrap}
.kw-label-pro,.kw-label-ez{color:#0F6E56}
.kw-label-ref,.kw-label-ind{color:#5F5E5A}

/* 专业释义 */
.kw-section-pro{background:transparent}
.kw-pro-text{font-size:.86rem;color:#1a1a1a;line-height:1.85}
.kw-pro-text mark{background:rgba(34,197,94,0.18);color:#166534;padding:0 2px;font-weight:600;border-radius:2px}

/* 数字/百分比 高亮 */
.kw-num-hl{color:#185FA5;font-weight:600;background:rgba(24,95,165,0.08);padding:1px 4px;border-radius:3px;border-bottom:1.5px solid rgba(24,95,165,0.4);cursor:default;transition:all .15s}
.kw-num-hl:hover{background:rgba(24,95,165,0.14);border-bottom-color:rgba(24,95,165,0.7)}

/* 大白话 */
.kw-section-ez{background:#F0F8F2;border-radius:12px;padding:12px 14px;border-top:none;margin-top:6px}
.kw-ez-text{font-size:.86rem;color:#1a1a1a;line-height:1.85}
.kw-ez-text mark{background:rgba(34,197,94,0.22);color:#166534;padding:0 2px;border-radius:2px;font-weight:600}

/* 查资料 */
.kw-section-ref{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:transparent}
.kw-section-ref .kw-label{margin-bottom:0}
.kw-ref-links{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.kw-ref{height:24px;padding:0 10px;border-radius:12px;display:inline-flex;align-items:center;gap:4px;background:#E8F1EB;color:#166534;font-size:.72rem;font-weight:600;letter-spacing:.02em;text-decoration:none;font-family:var(--font-display);transition:all .2s}
.kw-ref::after{content:'↗';font-size:.7rem;opacity:.7;margin-left:2px}
.kw-ref:hover{background:#0F6E56;color:#fff;transform:translateY(-1px)}

/* 行业数据 */
.kw-section-ind{background:transparent}
.kw-id-text{font-size:.86rem;color:#1a1a1a;line-height:1.85}
.kw-id-text mark{background:rgba(34,197,94,0.18);color:#166534;padding:0 2px;border-radius:2px;font-weight:600}

/* 分类过滤 */
.cat-filter{max-width:1200px;margin:0 auto 20px;padding:0 32px;display:flex;gap:8px;flex-wrap:wrap}
.cat-btn{padding:6px 14px;border-radius:20px;background:#fff;color:#555;font-size:.78rem;font-weight:500;border:1px solid rgba(0,0,0,0.08);cursor:pointer;transition:all .2s;font-family:var(--font-body)}
.cat-btn:hover{background:#F0F8F2;color:#0F6E56;border-color:rgba(15,110,86,0.2)}
.cat-btn.active{background:#0F6E56;color:#fff;border-color:#0F6E56}
.cat-btn .cnt{opacity:.6;margin-left:4px;font-size:.72rem}

/* 脚注 */
.page-foot{max-width:1200px;margin:60px auto 40px;padding:24px 32px;text-align:center;color:#999;font-size:.76rem;line-height:1.7;border-top:0.5px solid rgba(0,0,0,0.08)}

/* Scroll Reveal */
.scroll-reveal{opacity:0;transform:translateY(24px);transition:opacity .6s var(--ease-out),transform .6s var(--ease-out)}
.scroll-reveal.revealed{opacity:1;transform:translateY(0)}

/* ===== 产业链上中下游（投研研报风） ===== */
.vc-section{max-width:1200px;margin:0 auto 48px;padding:36px;border-radius:32px;background:rgba(255,255,255,0.78);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);box-shadow:0 4px 24px rgba(0,0,0,0.05),inset 0 0 0 1px rgba(255,255,255,0.5)}
.vc-head{margin-bottom:18px}
.vc-head h2{font-family:var(--font-display);font-size:1.32rem;font-weight:700;color:#111;margin-bottom:4px}
.vc-head h2 em{font-style:normal;color:#0F6E56;font-weight:500;font-size:.82rem;margin-left:8px}
.vc-head .vc-subtitle{font-size:.78rem;color:#888;letter-spacing:.01em}

.vc-insight{font-size:.82rem;color:#3a3a3a;line-height:1.8;background:#F9FAFB;border-left:3px solid #0F6E56;padding:14px 18px;border-radius:0 10px 10px 0;margin-bottom:22px}
.vc-insight::before{content:'产业链观察';display:block;font-size:.66rem;color:#0F6E56;letter-spacing:.12em;margin-bottom:6px;font-weight:600;text-transform:uppercase}
.vc-insight strong{color:#166534;font-weight:600}

/* 金钱流向示意（轴） */
.vc-money-flow{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;font-size:.78rem;color:#475569;background:#F8FAF7;border:1px solid #E8E3D4;border-radius:12px;margin-bottom:22px}
.vc-money-flow .mf-label{font-weight:600;color:#0F6E56;flex-shrink:0;white-space:nowrap}
.vc-money-flow .mf-arrow{flex:0 0 60px;display:flex;align-items:center;height:1.4rem}
.vc-money-flow .mf-arrow .line{flex:1;height:1px;background:linear-gradient(to right,#0F6E56,#BA7517)}
.vc-money-flow .mf-note{color:#475569;font-size:.78rem;line-height:1.7;flex:1;min-width:0}

/* 三列价值链 */
.vc-chain{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;position:relative;border:1px solid #EDE9DC;border-radius:16px;overflow:hidden}
.vc-col{padding:18px 18px 20px;position:relative;background:#fff}
.vc-col + .vc-col{border-left:1px solid #EDE9DC}
.vc-col.up{background:#F6FAF3}
.vc-col.mid{background:#F5FAF8}
.vc-col.down{background:#FCF7ED}

/* 层级头 */
.vc-col-head{margin-bottom:12px}
.vc-col-title{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.vc-col-title .cn{font-family:var(--font-display);font-size:1.02rem;font-weight:700;color:#111}
.vc-col-title .en{font-size:.66rem;color:#888;letter-spacing:.1em;text-transform:uppercase;font-weight:500}
.vc-col-badges{display:flex;gap:5px;margin-bottom:8px}
.vc-col-badge{font-size:.6rem;padding:2px 8px;border-radius:6px;font-weight:600;letter-spacing:.02em}
.vc-col-badge.m-high,.vc-col-badge.p-strong{background:#E8F5EC;color:#166534}
.vc-col-badge.m-mid,.vc-col-badge.p-medium{background:#F1F5F9;color:#475569}
.vc-col-badge.m-low,.vc-col-badge.p-weak{background:#FEF3C7;color:#A16207}
.vc-col-role{font-size:.74rem;color:#0F6E56;font-weight:600;line-height:1.55;margin-bottom:6px}
.vc-col-desc{font-size:.7rem;color:#555;line-height:1.7;padding-bottom:12px;margin-bottom:12px;border-bottom:1px dashed #E8E3D4}

/* 细分环节行 */
.vc-seg-row{padding:8px 0;border-bottom:1px dashed #F0EDE3;display:block}
.vc-seg-row:last-child{border-bottom:none}
.vc-seg-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:3px}
.vc-seg-name{font-size:.76rem;font-weight:600;color:#222}
.vc-seg-note{font-size:.65rem;color:#999;font-weight:400;text-align:right;max-width:55%}
.vc-seg-row .players{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.vc-seg-row .player{font-size:.63rem;padding:1px 7px;background:#fff;border:1px solid #E0DCCF;color:#444;border-radius:4px;font-weight:500}
.vc-seg-row:hover .player{border-color:#0F6E56;color:#0F6E56}

/* 列底部毛利带 */
.vc-col-meter{margin-top:14px;padding-top:10px;border-top:1px dashed #E8E3D4;display:flex;align-items:center;justify-content:space-between;font-size:.65rem;color:#888}
.vc-col-meter .metric{display:flex;align-items:center;gap:4px}
.vc-col-meter .dot{width:6px;height:6px;border-radius:50%}
.vc-col.up .dot{background:#3B6D11}
.vc-col.mid .dot{background:#0F6E56}
.vc-col.down .dot{background:#BA7517}

/* 小屏适配 */
@media (max-width:860px){
  .top3-section{padding:24px;border-radius:20px}
  .top3-grid{grid-template-columns:1fr}
  .page-head h1{font-size:2rem}
  .kw-grid{grid-template-columns:1fr}
  .vc-section{padding:24px;border-radius:20px}
  .vc-chain{grid-template-columns:1fr}
  .vc-col + .vc-col{border-left:none;border-top:1px solid #EDE9DC}
  .vc-money-flow{flex-direction:column;gap:10px;align-items:flex-start}
  .vc-money-flow .mf-arrow{width:60px;flex:0 0 auto}
}
@media (max-width:520px){
  .page-head{padding:40px 20px 24px}
  .kw-card{border-radius:14px}
  .kw-top{padding:16px 16px 10px}
  .kw-body{padding:0 16px 14px}
  .kw-section{padding:10px 0}
  .kw-section-ez{padding:10px 12px}
  .kw-ref{padding:0 8px;font-size:.68rem;height:22px}
  .kw-id-text,.kw-pro-text,.kw-ez-text{font-size:.83rem}
}
</style>
</head>
<body>
<div class="page-head">
  <h1>AI 生图</h1>
  <div class="subtitle"></div>
  <div class="meta"><span><strong>100</strong> 关键词</span><span><strong>3</strong> 标杆公司</span><span><strong>2025-2026</strong> 最新数据</span></div>
</div>

<!-- 三强区块 -->
<div class="top3-section" id="top3Section"></div>

<!-- 产业链上中下游（Sankey 桑基图） -->
<div class="vc-section" id="vcSection" style="display:none"></div>

<!-- 分类过滤 -->
<div class="cat-filter" id="catFilter"></div>

<!-- 关键词区 -->
<div class="kw-section-title">
  <h2>100 词百科<em>· 覆盖核心 / 财务 / 技术 / 商业四大维度</em></h2>
  <div class="kst-meta" id="kwMeta"></div>
</div>
<div class="kw-grid" id="kwGrid"></div>

<div class="page-foot">
  Generated by <strong style="color:#0F6E56">IndustryLens</strong> · 专业释义 + 大白话 + 行业数据 + 三强拆解<br>
  数据基于公开资料整理，不构成投资建议
</div>

<script>
// ========== 数据注入点 ==========
// 下面 3 个变量由 skill 在生成时填充
var INDUSTRY = {"name": "AI 生图", "desc": ""};
var KEYWORDS = [{"rank": 1, "cat": "core", "term": "扩散模型", "pro": "扩散模型（Diffusion Model）是一种生成式AI模型，通过逐步向数据添加噪声（前向过程）再学习逆转噪声（反向过程）来生成图像。2025年，Stable Diffusion 3和DALL-E 4等模型采用扩散架构，占据AI生图市场80%以上份额。扩散模型位于AI生图产业链的核心技术层，其性能直接影响图像质量和生成速度。商业上，开源模型如Stable Diffusion推动了社区创新，而闭源模型如Midjourney则通过订阅制盈利。", "ref": {"google": "扩散模型 原理 2025 Stable Diffusion", "wiki": "Diffusion model"}, "industryData": "2025年，Stability AI发布SD3，参数量8B，生成速度提升50%。", "ez": "就像把一张清晰照片慢慢弄模糊，再学会把模糊变清晰，AI就是这么画图的。"}, {"rank": 2, "cat": "core", "term": "CLIP", "pro": "CLIP（Contrastive Language-Image Pre-training）是OpenAI开发的视觉-语言模型，通过对比学习将文本和图像映射到同一向量空间。2025年，CLIP被广泛用于AI生图中的文本理解，如Stable Diffusion使用CLIP文本编码器。CLIP在零样本分类和跨模态检索中表现优异，准确率超过90%。在产业链中，CLIP属于基础模型层，为生图提供语义对齐能力。商业上，CLIP的开源版本（如OpenCLIP）降低了行业门槛。", "ref": {"google": "CLIP 模型 原理 2025", "wiki": "CLIP (artificial intelligence)"}, "industryData": "2025年，OpenCLIP ViT-L/14在ImageNet零样本top-1准确率达76.2%。", "ez": "CLIP就像AI的翻译官，把你说的话变成画图能懂的密码。"}, {"rank": 3, "cat": "core", "term": "Stable Diffusion", "pro": "Stable Diffusion（SD）是Stability AI开发的开源文本到图像扩散模型，2022年发布后成为AI生图领域标杆。2025年，SD3采用MMDiT架构，支持多模态输入，生成分辨率达1024x1024。SD的生态包括LoRA、ControlNet等插件，社区用户超1000万。在产业链中，SD作为开源基础模型，推动了AI生图的民主化。商业上，Stability AI通过企业API和云服务盈利，2025年估值超40亿美元。", "ref": {"google": "Stable Diffusion 3 2025 参数", "wiki": "Stable Diffusion"}, "industryData": "2025年，SD3在Hugging Face下载量超5000万次。", "ez": "Stable Diffusion就是AI画图界的Linux，免费开放，大家都能改着玩。"}, {"rank": 4, "cat": "core", "term": "Midjourney", "pro": "Midjourney是一家AI生图公司，以其订阅制Discord机器人服务闻名。2025年，Midjourney v6支持实时生成和迭代编辑，用户超2000万。其模型基于扩散架构，但未公开细节。Midjourney在艺术风格和美学上领先，被广泛用于概念设计和广告。在产业链中，Midjourney属于应用层，直接面向消费者。商业上，2025年营收预计达5亿美元，毛利率超80%。", "ref": {"google": "Midjourney 2025 用户数 营收", "wiki": "Midjourney"}, "industryData": "2025年，Midjourney月活用户1500万，付费率约10%。", "ez": "Midjourney就像AI画图界的苹果，设计精美但封闭，用起来很爽但得花钱。"}, {"rank": 5, "cat": "core", "term": "DALL-E", "pro": "DALL-E是OpenAI开发的文本到图像生成模型，2021年发布初代，2025年DALL-E 4集成至ChatGPT。DALL-E 4支持高分辨率（2048x2048）和精确文本渲染，在复杂场景理解上领先。其基于Transformer和扩散混合架构。在产业链中，DALL-E属于基础模型层，通过OpenAI API提供商业服务。2025年，DALL-E 4在COCO Captions评估中FID得分降至5.2。", "ref": {"google": "DALL-E 4 2025 性能 参数", "wiki": "DALL-E"}, "industryData": "2025年，DALL-E 4通过ChatGPT日均生成图像超1亿张。", "ez": "DALL-E是OpenAI的亲儿子，画得准但规矩多，不能画太出格的东西。"}, {"rank": 6, "cat": "core", "term": "文本到图像生成", "pro": "文本到图像生成（Text-to-Image Generation）是AI根据自然语言描述创建图像的技术。核心模型包括扩散模型和自回归模型。2025年，该技术已能生成照片级图像，在广告、游戏、影视等领域广泛应用。市场研究显示，2025年全球AI生图市场规模达120亿美元，年增长率45%。在产业链中，文本到图像生成位于应用层，是AI生图最核心的功能。商业上，API调用和订阅制是主要盈利模式。", "ref": {"google": "文本到图像生成 市场规模 2025", "wiki": "Text-to-image model"}, "industryData": "2025年，AI生图API日均调用量超10亿次。", "ez": "就是你说句话，AI就给你画出来，像魔法一样。"}, {"rank": 7, "cat": "core", "term": "图像到图像生成", "pro": "图像到图像生成（Image-to-Image Generation）是AI基于输入图像生成新图像的技术，包括风格迁移、超分辨率、修复等。2025年，ControlNet和InstructPix2Pix等工具实现精确控制。该技术常用于照片编辑、游戏资产创建。在产业链中，图像到图像生成属于应用层，与文本到图像互补。商业上，Adobe Firefly等产品集成该功能，2025年Adobe AI业务收入达20亿美元。", "ref": {"google": "图像到图像生成 2025 应用 ControlNet", "wiki": "Image-to-image translation"}, "industryData": "2025年，ControlNet在GitHub星数超5万，日均使用量百万次。", "ez": "给AI一张图，让它改成另一种风格，比如把照片变成油画。"}, {"rank": 8, "cat": "core", "term": "潜在扩散模型", "pro": "潜在扩散模型（Latent Diffusion Model, LDM）是Stable Diffusion的基础，在潜在空间而非像素空间进行扩散，大幅降低计算成本。2025年，LDM被几乎所有主流生图模型采用。其核心是使用VQ-VAE或VAE将图像压缩到潜在空间。在产业链中，LDM属于模型架构层，是高效生成的关键。商业上，LDM的开源使得初创公司也能训练自己的模型。", "ref": {"google": "潜在扩散模型 原理 2025 Stable Diffusion", "wiki": "Latent diffusion model"}, "industryData": "2025年，LDM训练成本降至1000美元以下（基于单GPU）。", "ez": "把图像压缩成小尺寸再处理，就像先画草图再细化，省时省力。"}, {"rank": 9, "cat": "core", "term": "VAE", "pro": "变分自编码器（Variational Autoencoder, VAE）是一种生成模型，用于学习数据的潜在表示。在AI生图中，VAE常用于潜在扩散模型的编码器/解码器。2025年，VAE在图像压缩中达到128x压缩比，重建质量高。在产业链中，VAE属于基础模型层，为高效生成提供支持。商业上，VAE被集成到几乎所有主流生图工具中。", "ref": {"google": "VAE 图像生成 2025 压缩比", "wiki": "Variational autoencoder"}, "industryData": "2025年，VAE在ImageNet重建PSNR达28dB。", "ez": "VAE就像压缩软件，把大图压成小文件，用的时候再解压。"}, {"rank": 10, "cat": "core", "term": "U-Net", "pro": "U-Net是一种卷积神经网络架构，最初用于医学图像分割，后成为扩散模型的核心组件。在AI生图中，U-Net用于预测噪声并逐步去噪。2025年，U-Net在Stable Diffusion中处理潜在空间特征图。其对称编码-解码结构有效保留细节。在产业链中，U-Net属于模型架构层。商业上，U-Net的开源促进了AI生图技术的普及。", "ref": {"google": "U-Net 扩散模型 2025 作用", "wiki": "U-Net"}, "industryData": "2025年，U-Net在SD3中参数量占模型总参数的60%。", "ez": "U-Net就像AI的画笔，一步步把模糊的图变清晰。"}, {"rank": 11, "cat": "core", "term": "提示词工程", "pro": "提示词工程（Prompt Engineering）是优化输入文本以引导AI生成期望图像的技术。2025年，提示词已成为AI生图的关键技能，社区分享最佳实践。高质量提示词可提升图像相关性30%以上。在产业链中，提示词工程属于用户交互层。商业上，提示词市场（如PromptBase）交易额达1亿美元。", "ref": {"google": "提示词工程 技巧 2025 AI生图", "wiki": "Prompt engineering"}, "industryData": "2025年，PromptBase平台交易量超500万次。", "ez": "就是学会怎么跟AI说话，让它画出你想要的东西。"}, {"rank": 12, "cat": "core", "term": "负面提示词", "pro": "负面提示词（Negative Prompt）是告诉AI在生成图像中避免某些元素的技术。2025年，几乎所有生图模型支持负面提示词，用于去除不想要的物体或风格。例如，输入“丑陋, 模糊”可提升图像质量。在产业链中，负面提示词属于用户控制层。商业上，负面提示词是高级用户订阅的卖点之一。", "ref": {"google": "负面提示词 使用 2025 Stable Diffusion", "wiki": "Negative prompt"}, "industryData": "2025年，80%的AI生图用户使用负面提示词。", "ez": "告诉AI不要画什么，比如“不要画猫”，它就会避开。"}, {"rank": 13, "cat": "core", "term": "CFG缩放", "pro": "无分类器引导缩放（Classifier-Free Guidance Scale, CFG）是控制AI生图与提示词一致性的参数。CFG值越高，图像越符合提示词，但可能牺牲多样性。2025年，默认CFG值通常为7-12。在产业链中，CFG属于模型推理参数。商业上，CFG调整是专业用户必备技能。", "ref": {"google": "CFG scale 含义 2025 AI生图", "wiki": "Classifier-free guidance"}, "industryData": "2025年，Midjourney默认CFG为7，用户可调至20。", "ez": "一个调节钮，拧得越大，AI越听你的话，但可能画得有点死板。"}, {"rank": 14, "cat": "core", "term": "采样器", "pro": "采样器（Sampler）是扩散模型中从噪声生成图像的具体算法，如DDIM、DPM++、Euler等。2025年，DPM++ 2M Karras成为主流，生成速度比DDIM快3倍。不同采样器影响图像质量和生成时间。在产业链中，采样器属于模型推理层。商业上，采样器选择影响用户对工具的偏好。", "ref": {"google": "采样器 对比 2025 Stable Diffusion", "wiki": "Sampling (signal processing)"}, "industryData": "2025年，DPM++在用户偏好中占60%份额。", "ez": "就像不同的画画方式，有的快但粗糙，有的慢但精细。"}, {"rank": 15, "cat": "core", "term": "步数", "pro": "步数（Steps）是扩散模型从纯噪声到最终图像的去噪迭代次数。2025年，典型步数为20-50步，更多步数通常带来更精细细节，但增加计算时间。在产业链中，步数属于推理参数。商业上，步数影响API调用成本，因此服务商常限制最大步数。", "ref": {"google": "步数 影响 图像质量 2025 AI生图", "wiki": "Diffusion model#Sampling"}, "industryData": "2025年，SD3默认步数为28，生成时间约2秒。", "ez": "步数越多，AI琢磨得越久，画得越细，但也更慢。"}, {"rank": 16, "cat": "core", "term": "种子", "pro": "种子（Seed）是随机数生成器的初始值，用于控制AI生图的随机性。相同种子和参数可复现同一图像。2025年，种子功能广泛用于实验和版本控制。在产业链中，种子属于用户控制层。商业上，种子共享成为社区文化。", "ref": {"google": "种子 作用 AI生图 2025", "wiki": "Random seed"}, "industryData": "2025年，CivitAI平台种子分享帖超1000万。", "ez": "就像游戏存档，同一个种子能生成一模一样的图。"}, {"rank": 17, "cat": "core", "term": "LoRA", "pro": "低秩适应（Low-Rank Adaptation, LoRA）是一种微调技术，通过插入少量可训练参数适配特定风格或物体。2025年，LoRA在AI生图中广泛用于个性化生成，文件大小仅几MB。在产业链中，LoRA属于模型微调层。商业上，LoRA模型市场（如CivitAI）交易活跃，头部创作者月入超万美元。", "ref": {"google": "LoRA 微调 2025 AI生图 应用", "wiki": "Low-rank adaptation"}, "industryData": "2025年，CivitAI上LoRA模型超50万个，下载量超10亿次。", "ez": "给AI装个小插件，让它学会画特定风格，比如宫崎骏风。"}, {"rank": 18, "cat": "core", "term": "ControlNet", "pro": "ControlNet是一种神经网络结构，通过添加条件控制（如边缘图、深度图、姿态）来精确引导AI生图。2025年，ControlNet 1.1支持12种控制模式，被集成到Stable Diffusion WebUI中。在产业链中，ControlNet属于模型控制层。商业上，ControlNet的开源推动了AI生图在工业设计中的应用。", "ref": {"google": "ControlNet 2025 版本 控制模式", "wiki": "ControlNet"}, "industryData": "2025年，ControlNet在GitHub星数超5万。", "ez": "给AI一个草图或姿势，它就能按这个框架画出完整图像。"}, {"rank": 19, "cat": "core", "term": "超分辨率", "pro": "超分辨率（Super-Resolution）是AI将低分辨率图像提升为高分辨率的技术。2025年，Real-ESRGAN和Stable Diffusion Upscaler等工具可将图像放大4-8倍，细节保真。在产业链中，超分辨率属于后处理层。商业上，Adobe和Topaz Labs等公司提供付费超分辨率服务。", "ref": {"google": "超分辨率 2025 AI 工具 对比", "wiki": "Super-resolution imaging"}, "industryData": "2025年，超分辨率API市场达5亿美元。", "ez": "把模糊的小图变清晰，就像侦探片里放大照片。"}, {"rank": 20, "cat": "core", "term": "修复", "pro": "修复（Inpainting）是AI填充图像中缺失或擦除部分的技术。2025年，Stable Diffusion Inpainting和RunwayML等工具实现精准修复，支持复杂场景。在产业链中，修复属于图像编辑层。商业上，修复功能是Photoshop AI版的核心卖点。", "ref": {"google": "AI 修复 图像 2025 工具", "wiki": "Inpainting"}, "industryData": "2025年，Adobe Photoshop AI修复功能使用量超10亿次。", "ez": "AI帮你补图，比如去掉照片里的路人，自动填充背景。"}, {"rank": 21, "cat": "core", "term": "扩展绘制", "pro": "扩展绘制（Outpainting）是AI在现有图像外部生成新内容以扩展画布的技术。2025年，DALL-E 4和Midjourney支持无缝扩展，保持风格一致。在产业链中，扩展绘制属于图像编辑层。商业上，扩展绘制用于广告创意和艺术创作。", "ref": {"google": "Outpainting 2025 AI 工具", "wiki": "Outpainting"}, "industryData": "2025年，Midjourney用户每月使用扩展绘制功能超5000万次。", "ez": "给图片加外框，AI自动画出框外的部分，像拼图。"}, {"rank": 22, "cat": "core", "term": "风格迁移", "pro": "风格迁移（Style Transfer）是将一种图像的风格应用到另一图像上的技术。2025年，神经风格迁移和AdaIN等算法被集成到AI生图工具中。在产业链中，风格迁移属于应用层。商业上，Prisma等应用曾风靡一时，但已被扩散模型取代。", "ref": {"google": "风格迁移 2025 AI 应用", "wiki": "Neural style transfer"}, "industryData": "2025年，风格迁移功能在AI生图工具中覆盖率达90%。", "ez": "把你的照片变成梵高风格，就像加滤镜但更高级。"}, {"rank": 23, "cat": "core", "term": "文本渲染", "pro": "文本渲染（Text Rendering）是AI在生成图像中准确显示文字的能力。2025年，DALL-E 4和Ideogram在文本渲染上领先，错误率低于5%。在产业链中，文本渲染属于模型能力层。商业上，精准文本渲染对广告和海报设计至关重要。", "ref": {"google": "AI 生图 文本渲染 2025 对比", "wiki": "Text rendering"}, "industryData": "2025年，Ideogram在文本渲染测试中准确率达98%。", "ez": "AI能不能在画里写出正确的字，比如招牌上的店名。"}, {"rank": 24, "cat": "core", "term": "多模态", "pro": "多模态（Multimodal）指AI同时处理文本、图像、音频等多种数据类型。2025年，AI生图模型如Stable Diffusion 3支持文本+图像输入生成新图像。在产业链中，多模态属于模型架构层。商业上，多模态能力是AI平台竞争焦点。", "ref": {"google": "多模态 AI 生图 2025 模型", "wiki": "Multimodal interaction"}, "industryData": "2025年，多模态生图模型市场份额达40%。", "ez": "AI不仅能看字，还能看图，把两者结合起来创作。"}, {"rank": 25, "cat": "core", "term": "扩散步数", "pro": "扩散步数（Diffusion Steps）与步数同义，指去噪迭代次数。2025年，研究显示20步即可生成高质量图像，但复杂场景需50步。在产业链中，扩散步数影响计算成本。商业上，云服务商按步数收费。", "ref": {"google": "扩散步数 2025 研究 最优值", "wiki": "Diffusion model#Sampling"}, "industryData": "2025年，SD3在20步时FID达8.0。", "ez": "AI从一团噪点变清晰需要走多少步，步数越多越清晰。"}, {"rank": 26, "cat": "core", "term": "潜在空间", "pro": "潜在空间（Latent Space）是数据压缩后的低维表示空间。在AI生图中，潜在扩散模型在潜在空间操作，降低计算量。2025年，潜在空间维度通常为64x64。在产业链中，潜在空间属于模型架构层。商业上，潜在空间大小影响模型效率。", "ref": {"google": "潜在空间 维度 2025 Stable Diffusion", "wiki": "Latent space"}, "industryData": "2025年，SD3潜在空间维度为64x64x16。", "ez": "AI的脑内小世界，所有图像都压缩在这里处理。"}, {"rank": 27, "cat": "core", "term": "条件生成", "pro": "条件生成（Conditional Generation）是AI根据给定条件（如文本、图像）生成输出。AI生图本质是条件生成，条件影响输出。2025年，条件生成技术成熟，支持多条件组合。在产业链中，条件生成属于模型核心能力。商业上，条件生成是AI生图产品的基础。", "ref": {"google": "条件生成 2025 AI 生图 原理", "wiki": "Conditional generation"}, "industryData": "2025年，条件生成模型占AI生图市场95%。", "ez": "AI根据你的要求画图，你说啥它画啥。"}, {"rank": 28, "cat": "core", "term": "无条件生成", "pro": "无条件生成（Unconditional Generation）是AI在没有输入条件下随机生成图像。2025年，无条件生成用于探索模型能力，但商业应用有限。在产业链中，无条件生成属于基础研究。商业上，无条件生成常用于创意灵感。", "ref": {"google": "无条件生成 2025 AI 生图 例子", "wiki": "Unconditional generation"}, "industryData": "2025年，无条件生成模型在艺术社区受欢迎。", "ez": "AI自己随便画，就像随机涂鸦。"}, {"rank": 29, "cat": "core", "term": "生成对抗网络", "pro": "生成对抗网络（GAN, Generative Adversarial Network）由生成器和判别器组成，通过对抗训练生成图像。2025年，GAN在AI生图中已被扩散模型取代，但在某些任务（如超分辨率）仍有用。在产业链中，GAN属于早期技术。商业上，GAN曾用于Deepfake。", "ref": {"google": "GAN 2025 现状 与扩散模型对比", "wiki": "Generative adversarial network"}, "industryData": "2025年，GAN在学术论文中占比降至10%。", "ez": "GAN像造假币的和验钞的互相竞争，最后造假币的以假乱真。"}, {"rank": 30, "cat": "core", "term": "自回归模型", "pro": "自回归模型（Autoregressive Model）逐像素或逐块生成图像，如PixelCNN和DALL-E初代。2025年，自回归模型在文本渲染上优势明显，但生成速度慢。在产业链中，自回归模型属于模型架构层。商业上，自回归模型被用于部分专业工具。", "ref": {"google": "自回归模型 2025 图像生成 应用", "wiki": "Autoregressive model"}, "industryData": "2025年，自回归模型在文本渲染准确率上领先5%。", "ez": "AI像写字一样，从左到右一笔一划地画图。"}, {"rank": 31, "cat": "finance", "term": "毛利率", "pro": "毛利率（Gross Margin）是（收入-直接成本）/收入。AI生图公司如Midjourney毛利率超80%，因其边际成本低（GPU折旧）。2025年，行业平均毛利率约60-80%。在产业链中，毛利率反映技术壁垒。商业上，高毛利率吸引投资。", "ref": {"google": "AI生图 毛利率 2025 Midjourney", "wiki": "Gross margin"}, "industryData": "2025年，Stability AI毛利率约65%，Midjourney约85%。", "ez": "卖100块赚80块，AI生图真是暴利生意。"}, {"rank": 32, "cat": "finance", "term": "ARR", "pro": "年度经常性收入（Annual Recurring Revenue, ARR）是订阅制公司的重要指标。2025年，Midjourney ARR预计达5亿美元，Stability AI ARR约1亿美元。在产业链中，ARR反映用户粘性。商业上，高ARR公司估值更高。", "ref": {"google": "AI生图 ARR 2025 Midjourney", "wiki": "Annual recurring revenue"}, "industryData": "2025年，AI生图行业平均ARR增长率为50%。", "ez": "每年固定能收多少钱，就像收房租一样稳。"}, {"rank": 33, "cat": "finance", "term": "ARPU", "pro": "每用户平均收入（Average Revenue Per User, ARPU）是总收入/用户数。2025年，Midjourney ARPU约15美元/月，行业平均10-20美元。在产业链中，ARPU反映定价能力。商业上，提升ARPU是增长关键。", "ref": {"google": "AI生图 ARPU 2025 行业平均", "wiki": "Average revenue per user"}, "industryData": "2025年，Stability AI ARPU为8美元/月。", "ez": "每个用户平均贡献多少钱，就像客单价。"}, {"rank": 34, "cat": "finance", "term": "CAC", "pro": "客户获取成本（Customer Acquisition Cost, CAC）是获取新客户的总费用。2025年，AI生图公司CAC约50-200美元，主要来自广告。在产业链中，CAC影响盈利能力。商业上，低CAC公司更具优势。", "ref": {"google": "AI生图 CAC 2025 获客成本", "wiki": "Customer acquisition cost"}, "industryData": "2025年，Midjourney CAC约80美元，因其口碑传播。", "ez": "拉一个新用户要花多少钱，比如打广告的钱。"}, {"rank": 35, "cat": "finance", "term": "LTV", "pro": "客户生命周期价值（Lifetime Value, LTV）是客户在整个关系中的总利润。2025年，AI生图公司LTV约300-1000美元，LTV/CAC应>3。在产业链中，LTV决定长期价值。商业上，高LTV公司可持续增长。", "ref": {"google": "AI生图 LTV 2025 计算", "wiki": "Customer lifetime value"}, "industryData": "2025年，Midjourney LTV约600美元。", "ez": "一个用户一辈子能给你赚多少钱。"}, {"rank": 36, "cat": "finance", "term": "净留存率", "pro": "净留存率（Net Revenue Retention, NRR）是（期初收入+扩张收入-流失收入）/期初收入。2025年，AI生图公司NRR普遍>120%，因用户升级订阅。在产业链中，NRR反映产品粘性。商业上，高NRR公司估值溢价。", "ref": {"google": "AI生图 NRR 2025 行业数据", "wiki": "Net revenue retention"}, "industryData": "2025年，Midjourney NRR约130%。", "ez": "老用户不但没走，还花更多钱，就是净留存率高。"}, {"rank": 37, "cat": "finance", "term": "月活跃用户", "pro": "月活跃用户（Monthly Active Users, MAU）是每月至少使用一次产品的用户数。2025年，Midjourney MAU 1500万，Stable Diffusion WebUI MAU 2000万。在产业链中，MAU衡量产品规模。商业上，MAU是融资关键指标。", "ref": {"google": "AI生图 MAU 2025 排名", "wiki": "Monthly active users"}, "industryData": "2025年，AI生图行业总MAU超1亿。", "ez": "每个月有多少人打开用，就像APP的月活。"}, {"rank": 38, "cat": "finance", "term": "付费转化率", "pro": "付费转化率（Paid Conversion Rate）是付费用户/总用户。2025年，Midjourney付费转化率约10%，行业平均5-15%。在产业链中，转化率反映产品价值。商业上，提升转化率是增长重点。", "ref": {"google": "AI生图 付费转化率 2025 行业", "wiki": "Conversion rate"}, "industryData": "2025年，Stability AI付费转化率约5%。", "ez": "100个用户里有多少人愿意掏钱。"}, {"rank": 39, "cat": "finance", "term": "GPU利用率", "pro": "GPU利用率（GPU Utilization）是GPU计算时间占总时间的比例。2025年，AI生图公司GPU利用率目标>80%，以降低推理成本。在产业链中，GPU利用率影响毛利率。商业上，优化利用率可节省数百万美元。", "ref": {"google": "GPU利用率 AI生图 2025 优化", "wiki": "Graphics processing unit"}, "industryData": "2025年，Midjourney GPU利用率达90%。", "ez": "显卡有没有在拼命干活，利用率高说明没浪费。"}, {"rank": 40, "cat": "finance", "term": "推理成本", "pro": "推理成本（Inference Cost）是每次生成图像的计算成本。2025年，SD3单张图推理成本约0.002美元（基于A100）。在产业链中，推理成本影响定价。商业上，低成本模型更具竞争力。", "ref": {"google": "AI生图 推理成本 2025 每张", "wiki": "Inference"}, "industryData": "2025年，DALL-E 4推理成本约0.005美元/张。", "ez": "AI画一张图要花多少电费。"}, {"rank": 41, "cat": "finance", "term": "训练成本", "pro": "训练成本（Training Cost）是训练模型的总费用。2025年，SD3训练成本约500万美元，使用数千GPU。在产业链中，训练成本是进入壁垒。商业上，开源模型降低了训练成本。", "ref": {"google": "AI生图 训练成本 2025 模型", "wiki": "Training (machine learning)"}, "industryData": "2025年，开源模型训练成本可低至10万美元。", "ez": "训练AI要花多少钱，就像培养一个画家。"}, {"rank": 42, "cat": "finance", "term": "API调用量", "pro": "API调用量（API Calls）是应用程序接口的请求次数。2025年，AI生图API日均调用量超10亿次，OpenAI和Stability AI是主要提供商。在产业链中，API调用量反映需求。商业上，按调用量收费是常见模式。", "ref": {"google": "AI生图 API 调用量 2025", "wiki": "API"}, "industryData": "2025年，Stability AI API日均调用量2亿次。", "ez": "AI接口被调用了多少次，就像餐厅接了多少单。"}, {"rank": 43, "cat": "finance", "term": "订阅收入", "pro": "订阅收入（Subscription Revenue）是用户定期付费产生的收入。2025年，AI生图公司订阅收入占比超80%。Midjourney订阅计划从10-120美元/月。在产业链中，订阅模式提供稳定现金流。商业上，订阅制是主流。", "ref": {"google": "AI生图 订阅收入 2025 占比", "wiki": "Subscription business model"}, "industryData": "2025年，Midjourney订阅收入占95%。", "ez": "用户按月或年交钱，就像会员费。"}, {"rank": 44, "cat": "finance", "term": "企业客户", "pro": "企业客户（Enterprise Customers）是购买批量许可证或API服务的公司。2025年，AI生图企业客户包括Adobe、可口可乐等。企业合同金额通常5万-100万美元/年。在产业链中，企业客户贡献高收入。商业上，企业市场是增长点。", "ref": {"google": "AI生图 企业客户 2025 案例", "wiki": "Enterprise customer"}, "industryData": "2025年，Stability AI企业客户数超500家。", "ez": "公司客户，一次买很多，是大金主。"}, {"rank": 45, "cat": "finance", "term": "市场份额", "pro": "市场份额（Market Share）是公司收入占行业总收入的比例。2025年，Midjourney市场份额约30%，Stability AI 20%，OpenAI 25%。在产业链中，市场份额反映竞争力。商业上，领先者享受品牌溢价。", "ref": {"google": "AI生图 市场份额 2025 排名", "wiki": "Market share"}, "industryData": "2025年，前三大公司占市场75%份额。", "ez": "谁家卖得最多，就像手机市场占有率。"}, {"rank": 46, "cat": "finance", "term": "估值", "pro": "估值（Valuation）是公司基于财务和前景的市场价值。2025年，Midjourney估值约100亿美元，Stability AI估值40亿美元。在产业链中，估值反映投资者信心。商业上，高估值利于融资。", "ref": {"google": "AI生图 公司 估值 2025", "wiki": "Valuation (finance)"}, "industryData": "2025年，AI生图初创公司平均估值10亿美元。", "ez": "这家公司值多少钱，就像身价。"}, {"rank": 47, "cat": "finance", "term": "融资轮次", "pro": "融资轮次（Funding Round）是公司从投资者筹集资金的阶段。2025年，AI生图公司如Stability AI完成C轮融资1亿美元。在产业链中，融资轮次反映发展阶段。商业上，融资用于扩张。", "ref": {"google": "AI生图 融资 2025 轮次", "wiki": "Funding round"}, "industryData": "2025年，AI生图行业融资总额超50亿美元。", "ez": "公司找投资人要钱，A轮B轮C轮。"}, {"rank": 48, "cat": "finance", "term": "收入增长率", "pro": "收入增长率（Revenue Growth Rate）是本期收入增长比例。2025年，AI生图行业收入增长率约45%，Midjourney增长60%。在产业链中，增长率衡量扩张速度。商业上，高增长率公司受追捧。", "ref": {"google": "AI生图 收入增长率 2025 行业", "wiki": "Growth rate"}, "industryData": "2025年，Stability AI收入增长率约40%。", "ez": "赚钱速度涨得多快，就像工资涨幅。"}, {"rank": 49, "cat": "finance", "term": "EBITDA", "pro": "息税折旧摊销前利润（EBITDA）是扣除利息、税、折旧、摊销前的利润。2025年，Midjourney EBITDA利润率约70%，因其轻资产。在产业链中，EBITDA反映运营效率。商业上，EBITDA用于估值。", "ref": {"google": "AI生图 EBITDA 2025 Midjourney", "wiki": "EBITDA"}, "industryData": "2025年，Stability AI EBITDA为负，因高研发投入。", "ez": "公司赚的钱，去掉一些固定开销，看真实盈利。"}, {"rank": 50, "cat": "finance", "term": "自由现金流", "pro": "自由现金流（Free Cash Flow, FCF）是经营活动现金流减去资本支出。2025年，Midjourney FCF为正，约2亿美元。在产业链中，FCF反映自我造血能力。商业上，正FCF公司更健康。", "ref": {"google": "AI生图 自由现金流 2025 公司", "wiki": "Free cash flow"}, "industryData": "2025年，Stability AI FCF为负，因投资GPU。", "ez": "公司真正能自由支配的钱，就像你的可支配收入。"}, {"rank": 51, "cat": "tech", "term": "ControlNet", "pro": "ControlNet是一种神经网络架构，用于控制预训练扩散模型（如Stable Diffusion）的生成过程。它通过添加可训练的条件控制模块，允许用户指定边缘检测、深度图、姿态估计等空间条件，从而精确控制生成图像的布局和结构。2025年，ControlNet已广泛应用于AI生图工具，如ComfyUI和Automatic1111 WebUI，支持多种控制模式。其产业链位置属于模型微调层，显著提升了AI生图的可控性和商业应用价值，例如在电商产品图生成中，通过边缘控制确保产品形状准确。", "ref": {"google": "ControlNet AI 生图 控制 2025", "wiki": "ControlNet"}, "industryData": "2025年，ControlNet在Stable Diffusion生态中插件下载量超500万次，被Adobe Firefly等商业工具集成。", "ez": "就像给AI画画加了个遥控器，你可以指定轮廓、姿势，让它听话地画出你想要的构图。"}, {"rank": 52, "cat": "tech", "term": "LoRA (Low-Rank Adaptation)", "pro": "LoRA是一种高效的模型微调技术，通过低秩矩阵分解减少可训练参数数量，从而在保持预训练模型能力的同时实现快速适应新任务。在AI生图中，LoRA常用于定制特定风格或角色，如动漫风格、特定画师笔触。2025年，LoRA模型在Civitai平台数量超过100万，训练成本降低至原方法的10%。产业链中属于模型定制层，使中小企业和个人开发者能以低成本生成专属风格图像，推动了AI生图的个性化应用。", "ref": {"google": "LoRA AI 生图 微调 2025", "wiki": "LoRA (Low-Rank Adaptation)"}, "industryData": "2025年，LoRA模型在Civitai平台下载量超10亿次，训练时间从数小时缩短至30分钟。", "ez": "就像给AI换皮肤，不用重头学，只花一点点功夫就能学会画新风格。"}, {"rank": 53, "cat": "tech", "term": "Diffusion Transformer (DiT)", "pro": "Diffusion Transformer是一种将扩散模型与Transformer架构结合的生成模型，替代传统的U-Net作为去噪网络。DiT通过自注意力机制捕获全局依赖，在图像生成质量和多样性上表现优异。2025年，DiT被用于Sora等视频生成模型，以及Stable Diffusion 3等图像模型，参数量可达数十亿。其产业链位置属于基础模型层，推动了AI生图向更高分辨率（如4K）和更逼真细节发展，商业上被Adobe和Midjourney等公司采用。", "ref": {"google": "Diffusion Transformer DiT 2025 AI 生图", "wiki": "Diffusion Transformer"}, "industryData": "2025年，DiT在ImageNet生成任务中FID降至2.1，被OpenAI Sora和Stability AI采用。", "ez": "AI画画的新大脑，用Transformer看全局，画出的图更清晰、更连贯。"}, {"rank": 54, "cat": "tech", "term": "CFG (Classifier-Free Guidance) Scale", "pro": "CFG Scale是扩散模型中的一个超参数，用于控制生成图像与条件提示的符合程度。数值越高，图像越严格遵循文本描述，但可能牺牲多样性；数值越低，生成结果更随机。2025年，主流AI生图工具如Midjourney和DALL-E 3默认CFG Scale在7-12之间，用户可手动调整。产业链中属于推理调参层，直接影响用户体验，商业上通过优化CFG Scale提升生成满意度，减少废图率。", "ref": {"google": "CFG Scale AI 生图 参数 2025", "wiki": "Classifier-Free Guidance"}, "industryData": "2025年，CFG Scale在Stable Diffusion中常用值为7.5，Midjourney默认值为10，用户调整频率占参数设置的30%。", "ez": "就像AI的听话程度旋钮，拧得越高，它越严格按照你的描述画，但可能有点死板。"}, {"rank": 55, "cat": "tech", "term": "VAE (Variational Autoencoder)", "pro": "VAE是一种生成模型，由编码器和解码器组成，学习将图像压缩到潜在空间并重建。在AI生图中，VAE常用于将图像编码为潜在表示，供扩散模型处理，或用于图像压缩和去噪。2025年，Stable Diffusion使用VAE将512x512图像压缩为64x64潜在特征，提升生成效率。产业链中属于基础模型层，其变体如VQ-VAE被用于高分辨率生成，商业上被NVIDIA和Google用于图像生成管线。", "ref": {"google": "VAE AI 生图 潜在空间 2025", "wiki": "Variational autoencoder"}, "industryData": "2025年，VAE在Stable Diffusion中压缩比达64倍，被用于超过80%的AI生图工具。", "ez": "AI的压缩打包工具，把大图变成小包裹，方便快速处理，再解包成清晰图像。"}, {"rank": 56, "cat": "tech", "term": "CLIP (Contrastive Language-Image Pre-training)", "pro": "CLIP是OpenAI开发的对比学习模型，通过大量图文对训练，学习图像与文本的语义对齐。在AI生图中，CLIP用于将文本提示编码为向量，指导扩散模型生成匹配的图像。2025年，CLIP的改进版本如OpenCLIP和SigLIP被广泛使用，参数量从几十M到几百M不等。产业链中属于多模态理解层，是文本到图像生成的关键桥梁，商业上被Midjourney、Stable Diffusion等集成，推动搜索和推荐系统。", "ref": {"google": "CLIP AI 生图 文本编码 2025", "wiki": "CLIP (Contrastive Language-Image Pre-training)"}, "industryData": "2025年，CLIP在LAION-5B数据集上训练，被超过90%的文本到图像模型使用。", "ez": "AI的翻译官，把你说的话变成它能理解的数字密码，确保画出来的图符合你的描述。"}, {"rank": 57, "cat": "tech", "term": "Inpainting", "pro": "Inpainting是图像修复技术，在AI生图中指根据文本提示或周围内容智能填充图像缺失或选中的区域。2025年，基于扩散模型的Inpainting工具如Stable Diffusion Inpainting和Photoshop Generative Fill，支持高精度修复，如移除物体、扩展背景。产业链中属于应用层，在电商、影视后期中广泛使用，商业上Adobe和Canva集成该功能，用户量超千万。", "ref": {"google": "AI Inpainting 图像修复 2025", "wiki": "Inpainting"}, "industryData": "2025年，Adobe Photoshop的Generative Fill功能月活跃用户超500万，修复准确率达95%。", "ez": "AI的PS橡皮擦，你圈出不要的部分，它自动补上合适的图案，就像变魔术。"}, {"rank": 58, "cat": "tech", "term": "Outpainting", "pro": "Outpainting是图像扩展技术，AI根据文本提示或图像内容，在原始图像外围生成新的内容，扩大画布。2025年，DALL-E 3和Midjourney支持Outpainting，可扩展至原图2-4倍大小，保持风格一致。产业链中属于应用层，用于广告设计、虚拟场景构建，商业上被Getty Images用于版权图扩展，降低创作成本。", "ref": {"google": "AI Outpainting 图像扩展 2025", "wiki": "Outpainting"}, "industryData": "2025年，DALL-E 3 Outpainting功能使用率增长200%，平均扩展图像至1.5倍。", "ez": "AI的扩图神器，给照片四周添加新内容，比如把单人照变成风景大片。"}, {"rank": 59, "cat": "tech", "term": "Negative Prompt", "pro": "Negative Prompt是AI生图中的一种技术，允许用户指定不希望出现在图像中的元素，以排除不想要的物体、风格或颜色。2025年，几乎所有主流生图工具（如Stable Diffusion、Midjourney）都支持Negative Prompt，常用词如“ugly, blurry, extra limbs”。产业链中属于用户交互层，显著提升生成质量，商业上通过减少废图提高用户满意度。", "ref": {"google": "Negative Prompt AI 生图 2025", "wiki": "Negative prompt"}, "industryData": "2025年，Negative Prompt在Stable Diffusion WebUI中使用率超70%，平均减少30%的生成缺陷。", "ez": "给AI的‘不要清单’，比如‘不要模糊、不要多手’，让它避开你讨厌的东西。"}, {"rank": 60, "cat": "tech", "term": "Sampling Method (DDIM, DPM++ etc.)", "pro": "采样方法是扩散模型中将随机噪声逐步去噪生成图像的过程算法。常见方法包括DDIM（快速采样）、DPM++（高质量）、Euler等。2025年，DPM++ 2M Karras成为Stable Diffusion默认采样器，平衡速度和质量。产业链中属于推理优化层，不同采样器影响生成速度和细节，商业上工具如ComfyUI提供多种选择，用户可根据需求调整。", "ref": {"google": "采样方法 DDIM DPM++ AI 生图 2025", "wiki": "Diffusion model sampling"}, "industryData": "2025年，DPM++ 2M Karras在Stable Diffusion中采样步数降至20步，生成时间缩短40%。", "ez": "AI画画的‘烹饪方式’，有的快但粗糙，有的慢但精致，你可以选想要的。"}, {"rank": 61, "cat": "tech", "term": "Upscaling (超分辨率)", "pro": "Upscaling是AI将低分辨率图像放大为高分辨率的技术，常用模型包括ESRGAN、Real-ESRGAN和基于扩散的超分模型。2025年，AI生图工具内置超分功能，可将1024x1024图像放大至4K，保持细节清晰。产业链中属于后处理层，在印刷、广告中必不可少，商业上Topaz Labs和Adobe提供专业超分软件，市场年增长25%。", "ref": {"google": "AI Upscaling 超分辨率 2025", "wiki": "Image scaling"}, "industryData": "2025年，Real-ESRGAN在GitHub星数超3万，被集成到超过50个AI生图工具中。", "ez": "AI的放大镜，把模糊小图变清晰大图，比如把手机照片变成海报尺寸。"}, {"rank": 62, "cat": "tech", "term": "Textual Inversion", "pro": "Textual Inversion是一种个性化生成技术，通过少量图像学习新概念（如特定物体或风格），并将其嵌入到文本编码器的词嵌入空间中。2025年，该技术被用于Stable Diffusion，用户只需3-5张图即可学习新词，如“我的狗”。产业链中属于模型定制层，降低了个人化门槛，商业上被用于虚拟试穿和品牌定制。", "ref": {"google": "Textual Inversion AI 生图 个性化 2025", "wiki": "Textual inversion"}, "industryData": "2025年，Textual Inversion在Civitai上相关模型超10万个，学习时间从1小时降至15分钟。", "ez": "教AI认识新东西，比如用几张照片让它学会画你的宠物，然后你只要说‘我的狗’就行。"}, {"rank": 63, "cat": "tech", "term": "DreamBooth", "pro": "DreamBooth是一种个性化文本到图像模型微调技术，由Google Research提出，通过少量图像（通常5-20张）和一个类别词，将特定主体（如人物、物体）融入预训练模型。2025年，DreamBooth被用于生成个人肖像、产品图，训练时间约10分钟。产业链中属于模型微调层，商业上被用于电商定制和虚拟形象生成，但需要较高计算资源。", "ref": {"google": "DreamBooth AI 生图 个性化 2025", "wiki": "DreamBooth"}, "industryData": "2025年，DreamBooth在Hugging Face上模型超5万个，被集成到Replicate等平台。", "ez": "给AI开小灶，用几张照片让它记住你的脸，之后就能把你画进任何场景。"}, {"rank": 64, "cat": "tech", "term": "Attention Map (注意力图)", "pro": "Attention Map是Transformer和扩散模型中可视化注意力权重的工具，显示模型在生成图像时关注文本中的哪些词。2025年，Attention Map被用于调试和优化提示词，例如通过交叉注意力图调整物体位置。产业链中属于可解释性层，帮助用户理解生成过程，商业上被用于提升生成准确性和教育。", "ref": {"google": "Attention Map AI 生图 可视化 2025", "wiki": "Attention map"}, "industryData": "2025年，Attention Map在Stable Diffusion WebUI插件中下载量超100万次，用于提示词优化。", "ez": "AI的‘眼睛轨迹’，告诉你它画图时重点看了你描述的哪个词，比如‘红苹果’中的‘红’。"}, {"rank": 65, "cat": "tech", "term": "Latent Space (潜在空间)", "pro": "潜在空间是生成模型中压缩表示的低维空间，图像被编码为潜在向量，模型在此空间中进行操作。在AI生图中，扩散过程在潜在空间中进行，而非像素空间，从而提升效率。2025年，Stable Diffusion的潜在空间维度为64x64x4，相比像素空间减少约48倍计算量。产业链中属于核心理论层，理解潜在空间有助于优化生成质量和速度。", "ref": {"google": "Latent Space AI 生图 2025", "wiki": "Latent space"}, "industryData": "2025年，潜在空间技术使AI生图速度提升10倍，被所有主流扩散模型采用。", "ez": "AI的‘脑内地图’，图像被压缩成抽象数字，它在这里思考如何画图，效率更高。"}, {"rank": 66, "cat": "tech", "term": "Prompt Engineering (提示工程)", "pro": "提示工程是优化输入文本以引导AI生成期望结果的技术，包括关键词选择、结构化和负面提示。2025年，提示工程成为AI生图的关键技能，高级提示词可包含权重、角色和风格描述。产业链中属于用户交互层，商业上催生了提示词市场（如PromptBase），专业提示师时薪可达数百美元。", "ref": {"google": "Prompt Engineering AI 生图 技巧 2025", "wiki": "Prompt engineering"}, "industryData": "2025年，PromptBase平台交易额超500万美元，专业提示词平均售价2-5美元。", "ez": "像写作文一样，用精准的词句指挥AI画出你想要的东西，词越好图越棒。"}, {"rank": 67, "cat": "tech", "term": "Seed (随机种子)", "pro": "Seed是AI生图中的随机数种子，用于控制生成过程的初始噪声，相同的种子和参数会生成完全相同的图像。2025年，主流工具如Midjourney和Stable Diffusion允许用户指定种子，便于复现和微调。产业链中属于推理参数层，种子固定后，调整其他参数（如提示词）可进行迭代优化，商业上用于A/B测试和批量生成。", "ref": {"google": "Seed AI 生图 随机种子 2025", "wiki": "Random seed"}, "industryData": "2025年，Midjourney用户中约30%使用固定种子进行图像迭代，种子值范围0-4294967295。", "ez": "AI的‘基因密码’，固定它就能复制出完全一样的画，方便你微调后对比效果。"}, {"rank": 68, "cat": "tech", "term": "Batch Size (批大小)", "pro": "Batch Size是AI模型训练或推理中一次处理的样本数量。在AI生图中，较大的Batch Size可提高GPU利用率，但增加显存消耗。2025年，主流显卡如RTX 4090可支持Batch Size 4-8生成1024x1024图像。产业链中属于计算优化层，商业上云服务通过动态调整Batch Size降低成本，如Replicate和RunPod。", "ref": {"google": "Batch Size AI 生图 显存 2025", "wiki": "Batch size"}, "industryData": "2025年，AI生图云服务中Batch Size 4的性价比最高，成本降低30%。", "ez": "AI一次画几张图，批越大画得越快，但需要更大的显存，就像一次炒多盘菜需要大锅。"}, {"rank": 69, "cat": "tech", "term": "Guidance Scale (引导尺度)", "pro": "Guidance Scale与CFG Scale类似，是控制生成图像与条件一致性的参数。在分类器引导中，它调节梯度强度；在无分类器引导中，它控制条件与无条件预测的混合比例。2025年，Guidance Scale在DALL-E 3中默认值为4.5，在Midjourney中为5-10。产业链中属于调参层，过高会导致图像过饱和或伪影，商业上通过自动调优提升用户体验。", "ref": {"google": "Guidance Scale AI 生图 参数 2025", "wiki": "Guidance scale"}, "industryData": "2025年，Midjourney v6中Guidance Scale推荐值为5-7，超出10时图像失真率增加50%。", "ez": "AI的‘听话程度’，数值越高越严格遵循描述，但太高会画得夸张甚至变形。"}, {"rank": 70, "cat": "tech", "term": "Denoising Strength (去噪强度)", "pro": "Denoising Strength是图像到图像（img2img）生成中的参数，控制输入图像被修改的程度。0表示完全保留原图，1表示完全重新生成。2025年，该参数在Stable Diffusion img2img中常用值为0.7-0.8，用于风格迁移和局部修改。产业链中属于应用层，在电商产品图优化中广泛使用，商业上被Adobe和Canva集成。", "ref": {"google": "Denoising Strength AI 生图 2025", "wiki": "Denoising strength"}, "industryData": "2025年，img2img功能使用中Denoising Strength中位数为0.75，生成速度提升20%。", "ez": "AI的‘改图力度’，数值低只微调，数值高就完全重画，就像PS的透明度滑块。"}, {"rank": 71, "cat": "tech", "term": "Canny Edge Detection (Canny边缘检测)", "pro": "Canny边缘检测是一种图像处理算法，用于提取图像中的边缘信息，常作为ControlNet的条件输入。2025年，Canny边缘检测在AI生图中用于控制生成图像的轮廓，确保物体形状准确。产业链中属于预处理层，在建筑设计、产品设计等领域应用，商业上被用于自动化生成线稿和草图。", "ref": {"google": "Canny Edge Detection AI 生图 2025", "wiki": "Canny edge detector"}, "industryData": "2025年，Canny边缘检测在ControlNet中是最常用的控制模式之一，使用率超40%。", "ez": "AI的‘素描底稿’，先画出轮廓，再上色填充，确保形状不走样。"}, {"rank": 72, "cat": "tech", "term": "Depth Map (深度图)", "pro": "深度图是表示图像中物体距离信息的灰度图，越近越亮。在AI生图中，深度图作为ControlNet条件，用于控制生成图像的立体感和空间布局。2025年，MiDaS和DPT模型用于估计深度图，精度达毫米级。产业链中属于3D感知层，在AR/VR和游戏场景生成中关键，商业上被NVIDIA和Unity集成。", "ref": {"google": "Depth Map AI 生图 ControlNet 2025", "wiki": "Depth map"}, "industryData": "2025年，深度图在ControlNet中用于3D场景生成，相关模型下载量超200万次。", "ez": "AI的‘距离感’，用黑白图告诉它哪里近哪里远，生成立体感强的图像。"}, {"rank": 73, "cat": "tech", "term": "Pose Estimation (姿态估计)", "pro": "姿态估计是计算机视觉技术，从图像或视频中识别人体关键点（如关节、头部）并构建骨骼模型。在AI生图中，姿态估计作为ControlNet条件，控制生成人物的姿势。2025年，OpenPose和DensePose被广泛使用，支持多人姿态。产业链中属于人体感知层，在时尚设计、动画制作中应用，商业上被用于虚拟试衣和游戏角色生成。", "ref": {"google": "Pose Estimation AI 生图 ControlNet 2025", "wiki": "Pose estimation"}, "industryData": "2025年，OpenPose在ControlNet中下载量超300万次，支持最多18个关键点。", "ez": "AI的‘火柴人骨架’，你摆好姿势，它照着画出人物动作，比如跳舞或跑步。"}, {"rank": 74, "cat": "tech", "term": "Semantic Segmentation (语义分割)", "pro": "语义分割是将图像每个像素分类为预定义类别（如天空、草地、人）的技术。在AI生图中，语义分割图作为ControlNet条件，控制生成图像的语义区域。2025年，SegFormer和Mask2Former用于高精度分割，mIoU达85%。产业链中属于场景理解层，在自动驾驶和医疗影像中也有应用，商业上被用于自动生成场景布局。", "ref": {"google": "Semantic Segmentation AI 生图 ControlNet 2025", "wiki": "Image segmentation"}, "industryData": "2025年，语义分割在ControlNet中用于城市景观生成，准确率提升至90%。", "ez": "AI的‘填色地图’，把天空、草地、人分别标出来，然后按区域生成对应内容。"}, {"rank": 75, "cat": "tech", "term": "IP-Adapter (图像提示适配器)", "pro": "IP-Adapter是一种轻量级适配器，用于将图像特征注入扩散模型，实现图像条件生成（如图像风格迁移、参考图生成）。2025年，IP-Adapter在Stable Diffusion中流行，支持单图和多图参考。产业链中属于多模态条件层，商业上被用于品牌风格统一和个性化推荐，参数量仅22M。", "ref": {"google": "IP-Adapter AI 生图 图像提示 2025", "wiki": "IP-Adapter"}, "industryData": "2025年，IP-Adapter在GitHub星数超1万，被集成到ComfyUI和WebUI中。", "ez": "AI的‘参考图功能’，给一张风格图，它就能模仿那种风格画新内容。"}, {"rank": 76, "cat": "tech", "term": "T2I-Adapter (文本到图像适配器)", "pro": "T2I-Adapter是一种高效的适配器，用于将空间条件（如边缘、深度）注入预训练扩散模型，无需修改原模型权重。2025年，T2I-Adapter支持多种条件，参数量仅77M，推理速度比ControlNet快30%。产业链中属于条件控制层，商业上被用于实时生成和移动端部署。", "ref": {"google": "T2I-Adapter AI 生图 条件控制 2025", "wiki": "T2I-Adapter"}, "industryData": "2025年，T2I-Adapter在Stable Diffusion生态中模型下载量超500万次。", "ez": "AI的‘外挂插件’，不用改主程序就能添加新功能，比如控制边缘或深度。"}, {"rank": 77, "cat": "tech", "term": "AnimateDiff (动画扩散)", "pro": "AnimateDiff是一种基于扩散模型的动画生成框架，通过在预训练图像模型上添加运动模块，生成连贯的视频序列。2025年，AnimateDiff支持文本到视频和图像到视频，生成视频长度可达数秒。产业链中属于视频生成层，商业上被用于短视频创作和广告，但需要大量计算资源。", "ref": {"google": "AnimateDiff AI 动画 2025", "wiki": "AnimateDiff"}, "industryData": "2025年，AnimateDiff在GitHub星数超2万，生成视频分辨率达512x512。", "ez": "AI的‘动画师’，让静态图动起来，比如让画中的人物挥手或走路。"}, {"rank": 78, "cat": "tech", "term": "Stable Video Diffusion (SVD)", "pro": "Stable Video Diffusion是Stability AI开发的视频生成模型，基于图像扩散模型扩展，生成短视频片段。2025年，SVD支持从单张图像生成2-4秒视频，帧率14fps。产业链中属于视频生成层，商业上被用于社交媒体内容生成，但运动一致性仍有挑战。", "ref": {"google": "Stable Video Diffusion 2025 AI 视频", "wiki": "Stable Video Diffusion"}, "industryData": "2025年，SVD在Hugging Face上日下载量超1万次，生成视频平均时长3秒。", "ez": "AI的‘照片动起来’，给一张图，它就能生成几秒的小视频，比如风吹草动。"}, {"rank": 79, "cat": "tech", "term": "FLUX.1 (黑森林实验室模型)", "pro": "FLUX.1是Black Forest Labs开发的文本到图像生成模型，基于流匹配（Flow Matching）架构，在图像质量和多样性上表现优异。2025年，FLUX.1在多个基准测试中超越Stable Diffusion 3和Midjourney v6，支持1024x1024分辨率。产业链中属于基础模型层，商业上通过API提 // ========== 自动高亮数字 / L级别 ==========
function autoHl(html) {
  if (!html) return '';
  var placeholders = [];
  var safe = html.replace(/<mark[\s\S]*?<\/mark>|<b[\s\S]*?<\/b>|<a[\s\S]*?<\/a>/g, function(m){
    placeholders.push(m);
    return '__PH' + (placeholders.length - 1) + '__';
  });
  safe = safe.replace(/(\d+(?:\.\d+)?%\+?)/g, '<b class="kw-num-hl">$1</b>');
  safe = safe.replace(/\b(L[0-9](?:[\u2013\-]L[0-9])?\+?)\b/g, '<b class="kw-num-hl">$1</b>');
  safe = safe.replace(/__PH(\d+)__/g, function(_, idx){
    return placeholders[parseInt(idx, 10)];
  });
  return safe;
}

// ========== Scroll Reveal ==========
var revealObserver = null;
function observeScrollReveal() {
  if (revealObserver) revealObserver.disconnect();
  var cards = document.querySelectorAll('.scroll-reveal:not(.revealed)');
  if (!cards.length) return;
  revealObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var el = entry.target;
        var delay = parseInt(el.getAttribute('data-delay') || '0', 10);
        setTimeout(function() { el.classList.add('revealed'); }, delay);
        revealObserver.unobserve(el);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  cards.forEach(function(card) { revealObserver.observe(card); });
}

  var html = '<div class="vc-head">' +
    '<h2>产业链上中下游<em>· ' + INDUSTRY.name + ' 价值链拆解</em></h2>' +
    '<div class="vc-subtitle">上中下游三层结构 · 毛利与议价徽章 · 真实公司池</div>' +
  '</div>';

  if (VALUE_CHAIN.keyInsight) {
    html += '<div class="vc-insight">' + VALUE_CHAIN.keyInsight + '</div>';
  }

  // 金钱流向轴（仅展示当前行业的 flowNote，去掉硬编码占位文案）
  if (VALUE_CHAIN.flowNote) {
    html += '<div class="vc-money-flow">' +
      '<span class="mf-label">💰 价值流动</span>' +
      '<span class="mf-arrow"><span class="line"></span></span>' +
      '<span class="mf-note">' + VALUE_CHAIN.flowNote + '</span>' +
    '</div>';
  }

  // 三列价值链
  html += '<div class="vc-chain">';
  ['upstream', 'midstream', 'downstream'].forEach(function(key){
    var layer = VALUE_CHAIN[key];
    if (!layer) return;
    var marg = layer.marginLevel || 'mid';
    var pow = layer.bargainPower || 'medium';

    var segsHtml = (layer.segments || []).map(function(s){
      var players = (s.players || []).map(function(p){
        return '<span class="player">' + p + '</span>';
      }).join('');
      return '<div class="vc-seg-row">' +
        '<div class="vc-seg-top">' +
          '<span class="vc-seg-name">' + (s.name || '') + '</span>' +
          (s.note ? '<span class="vc-seg-note">' + s.note + '</span>' : '') +
        '</div>' +
        '<div class="players">' + players + '</div>' +
      '</div>';
    }).join('');

    html += '<div class="vc-col ' + layerCls[key] + '">' +
      '<div class="vc-col-head">' +
        '<div class="vc-col-title"><span class="cn">' + layerCNs[key] + '</span><span class="en">' + layerENs[key] + '</span></div>' +
        '<div class="vc-col-badges">' +
          '<span class="vc-col-badge m-' + marg + '">' + marginLabels[marg] + '</span>' +
          '<span class="vc-col-badge p-' + pow + '">' + powerLabels[pow] + '</span>' +
        '</div>' +
        (layer.role ? '<div class="vc-col-role">' + layer.role + '</div>' : '') +
        (layer.desc ? '<div class="vc-col-desc">' + layer.desc + '</div>' : '') +
      '</div>' +
      segsHtml +
      '<div class="vc-col-meter">' +
        '<span class="metric"><span class="dot"></span>' + (layer.segments || []).length + ' 个细分 · ' + (layer.segments || []).reduce(function(sum, s){ return sum + (s.players || []).length; }, 0) + ' 家代表公司</span>' +
        '<span>' + marginLabels[marg].split(' ')[1] + '</span>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';

  el.innerHTML = html;
}

// 初始化
renderTop3();
renderValueChain();
renderCatFilter();
renderGrid();
</script>
</body>
</html>
